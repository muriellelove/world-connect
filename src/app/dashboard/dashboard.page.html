<ion-split-pane contentId="main-content">
  <!-- Sidebar -->
  <ion-menu contentId="main-content" type="overlay">
    <ion-header>
      <ion-toolbar color="light">
        <ion-title>WorldConnect</ion-title>
      </ion-toolbar>
    </ion-header>
    <ion-content>
      <ion-list>
        <ion-menu-toggle auto-hide="false">
          <ion-item routerLink="/dashboard">
            <ion-icon name="home-outline" slot="start"></ion-icon>
            <ion-label>Dashboard</ion-label>
          </ion-item>
          <ion-item routerLink="/countries">
            <ion-icon name="flag-outline" slot="start"></ion-icon>
            <ion-label>Pays</ion-label>
          </ion-item>
          <ion-item routerLink="/weather">
            <ion-icon name="cloud-outline" slot="start"></ion-icon>
            <ion-label>Météo</ion-label>
          </ion-item>
        </ion-menu-toggle>
      </ion-list>
    </ion-content>
  </ion-menu>

  <!-- Page content -->
  <div class="main" id="main-content">
    <ion-header>
      <ion-toolbar color="primary">
        <ion-title>Dashboard</ion-title>
        <ion-buttons slot="end">
          <ion-button (click)="logout()" fill="clear">
            <ion-icon name="log-out-outline" slot="icon-only"></ion-icon>
          </ion-button>
        </ion-buttons>
      </ion-toolbar>
    </ion-header>

    <ion-content class="ion-padding dashboard-content">
      <h2>Bienvenue, {{ user?.name }} 👋</h2>
      <p class="subtitle">Votre portail pour explorer les pays du monde et leur météo</p>

      <div class="metrics">
        <div class="metric-card">
          <ion-icon name="flag" class="icon"></ion-icon>
          <div>
            <h3>250</h3>
            <p>Pays référencés</p>
          </div>
        </div>
        <div class="metric-card">
          <ion-icon name="globe-outline" class="icon"></ion-icon>
          <div>
            <h3>6</h3>
            <p>Continents</p>
          </div>
        </div>
        <div class="metric-card">
          <ion-icon name="cloudy-outline" class="icon"></ion-icon>
          <div>
            <h3>35+</h3>
            <p>Météos chargées</p>
          </div>
        </div>
      </div>

      <img src="assets/world-illustration.avif" class="hero-image" />

      <div class="quick-actions">
        <ion-button expand="block" color="tertiary" routerLink="/countries">🌍 Explorer les pays</ion-button>
        <ion-button expand="block" color="warning" (click)="goToRandomCountry()">🎲 Pays aléatoire</ion-button>
      </div>
    </ion-content>
  </div>
</ion-split-pane>
